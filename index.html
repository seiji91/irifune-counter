<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入船朝市カウントダウン</title>
  <meta name="viewport" content="width=320, user-scalable=no">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
    }

    .container {
      width: 320px;
      margin: 0 auto;
      background-color: black;
      border: 4px solid yellow;
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
      font-family: sans-serif;
      color: white;
    }

    .header-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .title-image {
      height: 40px;
    }

    .subheading {
      font-size: 1em;
    }

    #countdown {
      display: inline-block;
      font-size: 1.6em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      margin-bottom: 8px;
    }

    .number {
      font-weight: bold;
      padding: 0 3px;
      color: yellow;
    }

    .label {
      margin-right: 4px;
    }

    footer {
      font-size: 0.7em;
      color: #ccc;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <img src="mark.png" alt="入船朝市タイトル画像" class="title-image">
      <div class="subheading">
        <strong>3月28日</strong>まで あと…
      </div>
    </div>

    <div id="countdown">
