<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  font-family: sans-serif;
}

/* ★ 上下余白を減らす */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 0;   /* ← 40px → 10px */
}

.timer-box {
  background: #000;
  border: 4px solid #ffd700;
  border-radius: 20px;
  box-shadow: 0 0 25px #ffd700;
  padding: 25px 30px;
  text-align: center;
  color: #fff;
  max-width: 680px;
  width: 94%;
}

.title {
  font-size: 26px;
  margin-bottom: 15px;
}

.title span {
  color: #ffd700;
  font-weight: bold;
}

.time {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: nowrap;
}

.time div {
  font-size: 44px;
  color: #ffd700;
  font-weight: bold;
  white-space: nowrap;
}

.label {
  font-size: 15px;
  color: #fff;
  margin-left: 4px;
}

@media (max-width: 600px) {

  .wrapper {
    padding: 5px 0;   /* ← スマホさらに圧縮 */
  }

  .timer-box {
    padding: 16px;
  }

  .title {
    font-size: 18px;
  }

  .time div {
    font-size: 22px;
  }

  .label {
    font-size: 11px;
  }
}
</style>
