<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  font-family: sans-serif;
}

/* PCで中央寄せ＆幅を少し細く */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0;
}

/* ★ 黒ボックス幅をスリムに */
.timer-box {
  background: #000;
  border: 4px solid #ffd700;
  border-radius: 20px;
  box-shadow: 0 0 25px #ffd700;
  padding: 30px 40px;
  text-align: center;
  color: #fff;
  max-width: 700px;   /* ← 900→700に変更 */
  width: 90%;
}

.title {
  font-size: 28px;
  margin-bottom: 20px;
}

.title span {
  color: #ffd700;
  font-weight: bold;
}

/* ★ 1行固定 */
.time {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: nowrap;   /* ← 改行させない */
}

.time div {
  font-size: 48px;
  color: #ffd700;
  font-weight: bold;
  white-space: nowrap; /* ← スマホでも折り返さない */
}

.label {
  font-size: 16px;
  color: #fff;
  margin-left: 4px;
}

/* スマホ調整 */
@media (max-width: 600px) {
  .timer-box {
    padding: 20px;
  }

  .time div {
    font-size: 26px;   /* ← 小さくして1行に収める */
  }

  .title {
    font-size: 20px;
  }
}
</style>
