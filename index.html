<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入船朝市カウントダウン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: sans-serif;
      background-color: black;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      background-color: black;
      border: 4px solid yellow;
      border-radius: 12px;
      padding: 16px;
      margin: 20px;
      box-sizing: border-box;
      max-width: 400px;
      width: 100%;
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .title-image {
      height: 50px;
    }

    .subheading {
      font-size: 1.2em;
    }

    #countdown {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      white-space: nowrap;
      font-size: 2em;
      margin-bottom: 10px;
    }

    .number {
      font-weight: bold;
      padding: 0 4px;
      color: yellow;
    }

    .label {
      margin-right: 6px;
    }

    footer {
      font-size: 0.75em;
      color: #ccc;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .title-image {
        height: 40px;
      }

      .subheading {
        font-size: 1em;
      }

      #countdown {
        font-size: 1.4em;
      }

      .container {
        padding: 12px;
        margin: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <img src="mark.png" alt="入船朝市タイトル画像" class="title-image">
      <div class="subheading">
        <strong>3月28日</strong><span>まで あと…</span>
      </div>
    </div>

    <div id="countdown">
      <span class="number" id="days">--</span><span class="label">日</span>
      <span class="number" id="hours">--</span><span class="label">時</span>
      <span class="number" id="minutes">--</span><span class="label">分</span>
      <span class="number" id="seconds">--</span><span class="label">秒</span>
    </div>

    <footer>© IRIFUNE COUNTER</footer>
  </div>

  <script>
    window.onload = function () {
      const targetDate = new Date(2026, 2, 28, 9, 0, 0); // 3月28日 午前9時

      function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
          document.getElementById("countdown").innerHTML = "イベント開始！";
          clearInterval(timer);
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = String(days).padStart(2, '0');
        document.getElementById("hours").textContent = String(hours).padStart(2, '0');
        document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
        document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
      }

      const timer = setInterval(updateCountdown, 1000);
      updateCountdown();
    };
  </script>
</body>
</html>
