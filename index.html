<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入船朝市カウントダウン</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background-color: black;
      border: 6px solid yellow;
      border-radius: 12px;
      width: fit-content;
      padding: 10px 30px; /* 上下を10pxにして余白を最小限に */
      color: white;
      font-family: sans-serif;
      text-align: center;
      box-sizing: border-box;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px; /* 少しだけ余白を減らす */
    }

    .title-image {
      height: 60px;
    }

    .subheading {
      font-size: 1.2em;
    }

    #countdown {
      font-size: 2em;
      margin-bottom: 10px; /* 少しだけ余白を減らす */
    }

    .number {
      font-weight: bold;
      padding: 0 4px;
      color: yellow; /* 数値を黄色に */
    }

    .label {
      margin-right: 8px;
    }

    footer {
      font-size: 0.8em;
      color: #ccc;
      margin-top: 4px; /* 最小限の余白 */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <img src="mark.png" alt="入船朝市タイトル画像" class="title-image">
      <div class="subheading">
        <strong>3月28日</strong><span>まで あと…</span>
      </div>
    </div>

    <div id="countdown">
      <span class="number" id="days">--</span><span class="label">日</span>
      <span class="number" id="hours">--</span><span class="label">時</span>
      <span class="number" id="minutes">--</span><span class="label">分</span>
      <span class="number" id="seconds">--</span><span class="label">秒</span>
    </div>

    <footer>© IRIFUNE COUNTER</footer>
  </div>

  <script>
    const targetDate = new Date(2026, 2, 28, 9, 0, 0); // 3月28日 午前9時

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "イベント開始！";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = String(days).padStart(2, '0');
      document.getElementById("hours").textContent = String(hours).padStart(2, '0');
      document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
      document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
