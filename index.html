<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入船朝市カウントダウン</title>
  <meta name="viewport" content="width=320, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: black;
    }

    .container {
      width: 320px;
      margin: 0 auto;
      background-color: black;
      border: 4px solid yellow;
      border-radius: 12px;
      padding: 12px;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }

    .header {
      font-size: 14px;
      margin-bottom: 8px;
    }

    #countdown {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      line-height: 1;
    }

    .number {
      color: yellow;
      padding: 0 2px;
    }

    .label {
      color: white;
      padding-right: 4px;
    }

    footer {
      font-size: 10px;
      color: #ccc;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      入船朝市　<strong>3月28日</strong>まで あと…
    </div>

    <div id="countdown">
      <span class="number" id="days">--</span><span class="label">日</span>
      <span class="number" id="hours">--</span><span class="label">時</span>
      <span class="number" id="minutes">--</span><span class="label">分</span>
      <span class="number" id="seconds">--</span><span class="label">秒</span>
    </div>

    <footer>© IRIFUNE COUNTER</footer>
  </div>

  <script>
    window.onload = function () {
      const targetDate = new Date(2026, 2, 28, 9, 0, 0); // 3月28日 午前9時

      function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
          document.getElementById("countdown").innerHTML = "イベント開始！";
          clearInterval(timer);
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = String(days).padStart(2, '0');
        document.getElementById("hours").textContent = String(hours).padStart(2, '0');
        document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
        document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
      }

      const timer = setInterval(updateCountdown, 1000);
      updateCountdown();
    };
  </script>
</body>
</html>
