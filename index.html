<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入船朝市カウントダウン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background-color: black;
      border: 6px solid yellow;
      border-radius: 12px;
      padding: 10px 30px;
      color: white;
      font-family: sans-serif;
      text-align: center;
      box-sizing: border-box;
      max-width: 100%;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .title-image {
      height: 60px;
    }

    .subheading {
      font-size: 1.2em;
    }

    #countdown {
      font-size: 2em;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .number {
      font-weight: bold;
      padding: 0 4px;
      color: yellow;
    }

    .label {
      margin-right: 8px;
    }

    footer {
      font-size: 0.8em;
      color: #ccc;
      margin-top: 4px;
    }

    /* 📱 スマホ用のメディアクエリ（縮小＋改行防止） */
    @media (max-width: 480px) {
      html, body {
        align-items: flex-start;
        padding-top: 20px;
      }

      .container {
        transform: scale(0.7);
        transform-origin: top center;
        margin: 0 auto;
      }

      #countdown {
        font-size: 1.6em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <img src="mark.png" alt="入船朝市タイトル画像" class="title-image">
      <div class="subheading">
        <strong>3月28日</strong><span>まで あと…</span>
      </div>
    </div>

    <div id="countdown">
      <span class="number" id="days">--</span><span class="label">日</span>
      <span class="number" id="hours">--</span><span class="label">時</span>
      <span class="number" id="minutes">--</span><span class="label">分</span>
      <span class="number" id="seconds">--</span><span class="label">秒</span>
    </div>

    <footer>© IRIFUNE COUNTER</footer>
  </div>

  <script>
    function updateCountdown() {
      const targetDate = new Date(2026, 2, 28, 9, 0, 0); // 3月28日 午前9時
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "イベント開始！";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = String(days).padStart(2, '0');
      document.getElementById("hours").textContent = String(hours).padStart(2, '0');
      document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
      document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
    }

    window.addEventListener("load", function () {
      updateCountdown();
      setInterval(updateCountdown, 1000);
    });
  </script>
</body>
</html>
