<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入船朝市カウントダウン</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  font-family: sans-serif;
}

.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0;
}

.timer-box {
  background: #000;
  border: 4px solid #ffd700;
  border-radius: 20px;
  box-shadow: 0 0 25px #ffd700;
  padding: 30px 40px;
  text-align: center;
  color: #fff;
  max-width: 700px;
  width: 92%;
}

.title {
  font-size: 28px;
  margin-bottom: 20px;
}

.title span {
  color: #ffd700;
  font-weight: bold;
}

.time {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: nowrap;
}

.time div {
  font-size: 46px;
  color: #ffd700;
  font-weight: bold;
  white-space: nowrap;
}

.label {
  font-size: 16px;
  color: #fff;
  margin-left: 4px;
}

@media (max-width: 600px) {

  .timer-box {
    padding: 18px;
  }

  .title {
    font-size: 20px;
  }

  .time div {
    font-size: 24px;
  }

  .label {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="timer-box">
    <div class="title">
      入船朝市 <span>3月28日</span>まであと…
    </div>

    <div class="time">
      <div><span id="days"></span><span class="label">日</span></div>
      <div><span id="hours"></span><span class="label">時</span></div>
      <div><span id="minutes"></span><span class="label">分</span></div>
      <div><span id="seconds"></span><span class="label">秒</span></div>
    </div>

    <div style="margin-top:20px; font-size:14px; opacity:0.6;">
      © IRIFUNE COUNTER
    </div>
  </div>
</div>

<script>
const targetDate = new Date("2026-03-28T00:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.querySelector(".time").innerHTML = "🎉 開催中です！";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
